# Cookie-Scan-Worker für lokale/Staging-Nutzung.
# CMS lokal: `npm run dev` (Admin/Web) oder Legacy: `npm run dev:legacy`.
# Worker: siehe Service unten. Supabase-ENV in .env.local oder hier setzen.

services:
  cookie-scan-worker:
    build:
      context: ./legacy/physio-source/cookie-scan-worker
      dockerfile: Dockerfile
    environment:
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-${SUPABASE_URL}}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - COOKIE_SCAN_POLL_INTERVAL=${COOKIE_SCAN_POLL_INTERVAL:-5000}
      - COOKIE_SCAN_WORKER_ID=cookie-scan-worker-1
    restart: unless-stopped
